version: '3.8'

services:
  api:
    build: .
    container_name: ecommerce_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      # These will override the variables in the .env file if it's placed in the container
      - DATABASE_URL=mongodb://mongo:27017/ecommerce_db
      - APP_NAME=E-Commerce Backend
      - DEBUG=True
      - SECRET_KEY=your-secret-key-here-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - mongo
    # You can alternatively use env_file to load directly from .env:
    # env_file:
    #   - .env

  mongo:
    image: mongo:latest
    container_name: ecommerce_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
